<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <defs>
        <!-- Shadow gradient for depth -->
        <linearGradient id="shortGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" /> <!-- dark blue -->
            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" /> <!-- very dark slate -->
        </linearGradient>
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="5" stdDeviation="6" flood-opacity="0.3" />
        </filter>
    </defs>
    <!-- Background circle for premium presentation -->
    <circle cx="200" cy="200" r="180" fill="#f8fafc" />
    
    <g filter="url(#drop-shadow)">
        <!-- Left Leg -->
        <path d="M 130,120 L 70,280 Q 90,290 130,290 L 180,210 Z" fill="url(#shortGrad)" />
        <!-- Right Leg -->
        <path d="M 270,120 L 330,280 Q 310,290 270,290 L 220,210 Z" fill="url(#shortGrad)" />
        
        <!-- Main body / crotch -->
        <path d="M 130,120 L 270,120 L 290,160 Q 200,240 180,210 L 220,210 Q 200,240 110,160 Z" fill="url(#shortGrad)" />
        <!-- Crotch filling and shape tweak -->
        <path d="M 130,120 L 270,120 L 220,210 Q 200,190 180,210 Z" fill="url(#shortGrad)" />

        <!-- Drawstrings -->
        <path d="M 180,125 Q 160,160 170,190" fill="none" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round" />
        <path d="M 220,125 Q 240,160 230,190" fill="none" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round" />

        <!-- Accent lines (white stripes on sides) -->
        <path d="M 130,120 L 70,280" fill="none" stroke="#f1f5f9" stroke-width="12" stroke-linecap="round"/>
        <path d="M 270,120 L 330,280" fill="none" stroke="#f1f5f9" stroke-width="12" stroke-linecap="round"/>
        
        <!-- Waistband -->
        <rect x="120" y="100" width="160" height="25" rx="8" fill="#0f172a" />
        <rect x="120" y="102" width="160" height="2" fill="#334155" />
        <rect x="120" y="112" width="160" height="2" fill="#334155" />
        <rect x="120" y="122" width="160" height="2" fill="#334155" />
    </g>
</svg>
